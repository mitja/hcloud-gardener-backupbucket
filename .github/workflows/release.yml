name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mitja/hcloud-gardener-backupbucket

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          check-latest: true

      - name: Verify build and tests
        run: |
          go vet ./...
          go test ./...

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package + push Helm chart as an OCI artifact
        # gardener-operator's Extension can only reference a chart via ociRepository
        # (no rawChart), so the chart is published to ghcr as an OCI artifact for the
        # virtual-garden (operator) backup path. The ControllerRegistration (gardenlet/
        # shoot path) still inlines the chart via rawChart in controller-registration.yaml.
        run: |
          VER="${GITHUB_REF_NAME#v}"
          helm package charts/gardener-extension-backupbucket-hcloud \
            --version "$VER" --app-version "${GITHUB_REF_NAME}"
          helm push "gardener-extension-backupbucket-hcloud-$VER.tgz" oci://${{ env.REGISTRY }}/mitja/charts

      - name: Generate controller-registration.yaml
        run: |
          ./hack/generate-controller-registration.sh \
            charts/gardener-extension-backupbucket-hcloud \
            controller-registration.yaml \
            "${{ github.ref_name }}"

      - name: Create GitHub release and attach asset
        uses: softprops/action-gh-release@v3
        with:
          files: controller-registration.yaml
          generate_release_notes: true
