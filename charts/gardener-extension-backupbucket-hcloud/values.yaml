image:
  # Public pull source: ghcr.io (mirrors hcloud-gardener-dnsrecord) so the seed pulls
  # without a pull secret; published by GitHub Actions on a v* tag (release.yml, built-in
  # GITHUB_TOKEN). A private copy is ALSO built + kept on the Forgejo registry
  # (git.paasbox.com/paasbox/hcloud-gardener-backupbucket) as a fallback if ghcr is down
  # — repoint image.repository there (+ imagePullSecrets) to fail over.
  repository: ghcr.io/mitja/hcloud-gardener-backupbucket
  # empty → the chart falls back to .Chart.AppVersion. CI packages the chart with
  # --app-version=<git tag> (e.g. v0.1.4) and pushes the matching image tag, so the
  # deployment auto-pins to the release instead of the floating :latest.
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# vertical pod autoscaler (optional)
vpa:
  enabled: true
  updateMode: Auto

# controller settings (one --max-concurrent-reconciles for both controllers)
controllers:
  concurrentSyncs: 5
  ignoreOperationAnnotation: false

# heartbeat lease renew interval in seconds
heartbeat:
  renewIntervalSeconds: 30

logLevel: info
logFormat: json

# optional pull secret(s) — not needed for the public ghcr.io image; set only if you
# point image.repository at a private registry
imagePullSecrets: []

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []

# Injected by gardener-operator when this extension is deployed into the garden RUNTIME
# cluster: the operator merges gardener.runtimeCluster.enabled=true + priorityClassName
# (pkg/operator/controller/extension/extension/runtime/runtime.go). When enabled, the
# controller reconciles the virtual-garden's own `class: garden` etcd BackupBucket via
# --extension-classes=garden and runs with the garden-system priority class. On a seed
# (gardenlet/shoot path, rawChart) this stays false → controller defaults to `shoot`.
gardener:
  runtimeCluster:
    enabled: false
    priorityClassName: gardener-garden-system-200
