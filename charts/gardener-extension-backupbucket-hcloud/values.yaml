image:
  # Distributed as a PUBLIC image on ghcr.io (mirrors hcloud-gardener-dnsrecord) so
  # the seed can pull it without a pull secret. Published by GitHub Actions on a v* tag
  # (.github/workflows/release.yml, via the built-in GITHUB_TOKEN). The Forgejo CI only
  # builds a private dev image (git.paasbox.com/paasbox/hcloud-gardener-backupbucket).
  repository: ghcr.io/mitja/hcloud-gardener-backupbucket
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

# vertical pod autoscaler (optional)
vpa:
  enabled: true
  updateMode: Auto

# controller settings (one --max-concurrent-reconciles for both controllers)
controllers:
  concurrentSyncs: 5
  ignoreOperationAnnotation: false

# heartbeat lease renew interval in seconds
heartbeat:
  renewIntervalSeconds: 30

logLevel: info
logFormat: json

# optional pull secret(s) — not needed for the public ghcr.io image; set only if you
# point image.repository at a private registry
imagePullSecrets: []

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
