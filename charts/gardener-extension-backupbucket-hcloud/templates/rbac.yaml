---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
# Cluster-scoped name is suffixed with the release Namespace: this chart is deployed TWICE on the
# same cluster — once on the gardener-operator RUNTIME path (ns runtime-extension-backupbucket-hcloud)
# and once as the per-seed ControllerInstallation (ns extension-backupbucket-hcloud-<hash>). With a
# constant name both renders collided on one cluster-scoped ClusterRole/Binding (last-writer-wins), so
# the seed SA was left UNBOUND -> "cannot list backupentries" -> BackupEntries stall in Processing ->
# shoot reconcile stuck at 18%. Per-namespace names give each deploy its own non-colliding RBAC.
metadata:
  name: {{ include "name" . }}-{{ .Release.Namespace }}
  labels:
{{ include "labels" . | indent 4 }}
rules:
# Namespaces: the extension manager's cache lists/watches namespaces to scope its
# informers; without this the cache never syncs, so the BackupEntry controller never
# starts and BackupEntries stall in "Processing" (stalling shoot reconciles).
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# BackupBucket/BackupEntry resources this extension reconciles, plus Cluster context.
- apiGroups:
  - extensions.gardener.cloud
  resources:
  - backupbuckets
  - backupbuckets/status
  - backupentries
  - backupentries/status
  - clusters
  verbs:
  - get
  - list
  - watch
  - patch
  - update
# namespaces: the BackupEntry generic actuator resolves the shoot control-plane namespace
# (and the manager cache watches Namespaces cluster-wide), so list/watch is required —
# without it the BackupEntry reconcile hangs at "Failed to watch *v1.Namespace".
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
# secrets: read the backup secretRef; create/update the generated bucket secret and
# the per-entry etcd-backup-restore secret. configmaps + events for status reporting.
- apiGroups:
  - ""
  resources:
  - secrets
  - configmaps
  - events
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Leader election and heartbeat leases.
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  resourceNames:
  - {{ include "leaderelectionid" . }}
  - gardener-extension-heartbeat
  verbs:
  - get
  - watch
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "name" . }}-{{ .Release.Namespace }}
  labels:
{{ include "labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "name" . }}-{{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "name" . }}
  namespace: {{ .Release.Namespace }}
